name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore JellyTrack.Plugin/JellyTrack.Plugin.csproj -p:JellyfinPackageVersion=10.11.10

    - name: Build
      run: dotnet build JellyTrack.Plugin/JellyTrack.Plugin.csproj --no-restore --configuration Release -p:JellyfinPackageVersion=10.11.10 -warnaserror:CS0618
