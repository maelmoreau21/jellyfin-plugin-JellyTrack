name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore JellyTrack.Plugin/JellyTrack.Plugin.csproj -p:JellyfinPackageVersion=10.11.10

    - name: Build and Publish
      run: dotnet publish JellyTrack.Plugin/JellyTrack.Plugin.csproj -c Release -o ./publish -p:JellyfinPackageVersion=10.11.10

    - name: Create Zip Archive
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        cp meta.json ./publish/meta.json
        cp assets/banner.png ./publish/Jellyfin.Plugin.JellyTrack.png
        cd ./publish
        zip -r ../Jellyfin.Plugin.JellyTrack-${VERSION}.zip meta.json Jellyfin.Plugin.JellyTrack.deps.json Jellyfin.Plugin.JellyTrack.dll Jellyfin.Plugin.JellyTrack.pdb Jellyfin.Plugin.JellyTrack.png
        cd ..

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: Jellyfin.Plugin.JellyTrack-*.zip
        generate_release_notes: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python Dependencies
      run: pip install pyyaml

    - name: Update manifest.json
      run: python scripts/update_manifest.py
      env:
        RELEASE_TAG: ${{ github.ref_name }}
        REPO: ${{ github.repository }}

    - name: Commit and Push manifest.json
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update manifest.json for release ${{ github.ref_name }}"
        git push origin HEAD:main
